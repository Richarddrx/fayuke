{% extends 'base.html' %}
{% block title %}Confirmer la suppression - europe58{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4 text-center">
                <h4 class="fw-bold text-danger mb-3">Confirmer la suppression</h4>
                <p style="color:#475569;">Êtes-vous sûr de vouloir supprimer <strong>"{{ object.title }}"</strong> ? Cette action est irréversible.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4" style="border-radius:8px;">Confirmer la suppression</button>
                    <a href="{% url 'listings:detail' object.slug %}" class="btn btn-outline-secondary px-4 ms-2" style="border-radius:8px;">Annuler</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
