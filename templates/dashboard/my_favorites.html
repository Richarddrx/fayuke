{% extends 'base.html' %}
{% block title %}我的收藏 - 法友客{% endblock %}

{% block content %}
<div class="container my-4">
    <h5 class="fw-bold mb-3">❤️ 我的收藏</h5>
    <div class="row g-3">
        {% for fav in object_list %}
        <div class="col-6 col-md-3">
            <div class="card listing-card h-100">
                <div class="card-body p-3">
                    <h6><a href="{% url 'listings:detail' fav.listing.slug %}">{{ fav.listing.title|truncatechars:20 }}</a></h6>
                    <span class="price-tag">{{ fav.listing.price|default:'面议' }}€</span>
                    <small class="text-muted d-block">{{ fav.created_at|date:"Y-m-d" }}</small>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="empty-state">
            <i class="bi bi-heart"></i>
            <p>暂无收藏</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
